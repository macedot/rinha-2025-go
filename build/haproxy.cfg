global
  maxconn 2000
  daemon

defaults
  mode http
  timeout client 5000s
  timeout connect 5000s
  timeout server 5000s
  option http-keep-alive

frontend frontend
  bind *:9999
  acl is_payments path_beg /payments
  acl is_summary path_beg /payments-summary
  use_backend payments_backend if is_payments
  use_backend summary_backend if is_summary
  default_backend consumer_backend

backend payments_backend
  balance roundrobin
  option http-keep-alive
  server producer-1 unix@/tmp/sockets/payments.sock.1 check
  server producer-2 unix@/tmp/sockets/payments.sock.2 check

backend summary_backend
  balance roundrobin
  option http-keep-alive
  server producer-1 unix@/tmp/sockets/summary.sock.1 check
  server producer-2 unix@/tmp/sockets/summary.sock.2 check

backend consumer_backend
    server consumer-1 unix@/tmp/sockets/purge.sock

frontend stats
    bind *:8888
    stats uri /stats
    stats enable
