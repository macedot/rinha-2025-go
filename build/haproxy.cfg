global
  maxconn 2000
  daemon

defaults
  mode http
  timeout client 5000s
  timeout connect 5000s
  timeout server 5000s
  option http-keep-alive

frontend frontend
  bind *:9999
  use_backend purge_backend if { path_beg /purge }
  default_backend payments_backend

backend payments_backend
  balance roundrobin
  option http-keep-alive
  server producer-1 unix@/dev/shm/go.sock.1 check
  server producer-2 unix@/dev/shm/go.sock.2 check

backend purge_backend
    server consumer-1 unix@/dev/shm/purge.sock check

frontend stats
    bind *:8888
    stats uri /stats
    stats enable
