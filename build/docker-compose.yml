x-service-templates:
  base: &base
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    volumes:
      - type: tmpfs
        target: /tmp/sockets
        tmpfs:
          size: 50 # Size in MB

services:
  gateway:
    image: haproxy:alpine
    container_name: rinha-gateway
    hostname: rinha-gateway
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api01
      - api02
    networks:
      - backend
    ports:
      - "8888:8888"
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '50MB'

  api01: &api
    <<: *base
    hostname: api01
    container_name: rinha-api01
    command: ./producer
    environment:
      - SOCKET_PAYMENT_IN=/tmp/sockets/payment.sock.1
      - SOCKET_SUMMARY_IN=/tmp/sockets/summary.sock.1
      - SOCKET_PAYMENT_OUT=/tmp/sockets/payment.sock
      - SOCKET_SUMMARY_OUT=/tmp/sockets/summary.sock
    networks:
      - backend
    ports:
      - "8081:8888"
    depends_on:
      storage:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 50M

  api02:
    <<: *api
    hostname: api02
    container_name: rinha-api02
    command: ./producer
    depends_on:
      - consumer
    environment:
      - SOCKET_PAYMENT_IN=/tmp/sockets/payment.sock.1
      - SOCKET_SUMMARY_IN=/tmp/sockets/summary.sock.1
      - SOCKET_PAYMENT_OUT=/tmp/sockets/payment.sock
      - SOCKET_SUMMARY_OUT=/tmp/sockets/summary.sock
    ports:
      - "8082:8888"

  consumer:
    <<: *base
    hostname: consumer
    container_name: rinha-consumer
    command: ./consumer
    environment:
      - SOCKET_PAYMENT_IN=/tmp/sockets/payment.sock
      - SOCKET_SUMMARY_IN=/tmp/sockets/summary.sock
      - SOCKET_PURGE_IN=/tmp/sockets/purge.sock
    networks:
      - backend
      - payment-processor
    ports:
      - "8089:8888"
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 100M

networks:
  backend:
  payment-processor:
    external: true

