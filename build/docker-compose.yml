x-service-templates:
  base: &base
    build:
      context: ../
      dockerfile: ./build/Dockerfile

services:
  gateway:
    image: haproxy:alpine
    container_name: rinha-gateway
    hostname: rinha-gateway
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - shm:/dev/shm
    depends_on:
      - api01
      - api02
    networks:
      - backend
    ports:
      - "8888:8888"
      - "9999:9999"
    healthcheck:
      test: [ "CMD-SHELL", "curl --fail http://localhost:9999/" ]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '50MB'

  api01: &api
    <<: *base
    hostname: api01
    container_name: rinha-api01
    command: ./producer
    environment:
      - SOCKET_API=/dev/shm/go.sock.1
      - SOCKET_PAYMENT=/dev/shm/payment.sock
      - SOCKET_SUMMARY=/dev/shm/summary.sock
    volumes:
      - shm:/dev/shm
    networks:
      - backend
    ports:
      - "8081:8888"
    depends_on:
      - consumer
    healthcheck:
      test: [ "CMD-SHELL", "test -f /dev/shm/go.sock.1" ]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: 50M

  api02:
    <<: *api
    hostname: api02
    container_name: rinha-api02
    command: ./producer
    environment:
      - SOCKET_API=/dev/shm/go.sock.2
      - SOCKET_PAYMENT=/dev/shm/payment.sock
      - SOCKET_SUMMARY=/dev/shm/summary.sock
    volumes:
      - shm:/dev/shm
    ports:
      - "8082:8888"
    healthcheck:
      test: [ "CMD-SHELL", "test -f /dev/shm/go.sock.2" ]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s

  consumer:
    <<: *base
    hostname: consumer
    container_name: rinha-consumer
    command: ./consumer
    environment:
      - SOCKET_PAYMENT=/dev/shm/payment.sock
      - SOCKET_SUMMARY=/dev/shm/summary.sock
      - SOCKET_PURGE=/dev/shm/purge.sock
    volumes:
      - shm:/dev/shm
    networks:
      - backend
      - payment-processor
    ports:
      - "8089:8888"
    healthcheck:
      test: [ "CMD-SHELL", "test -f /dev/shm/payment.sock && test -f /dev/shm/summary.sock && test -f /dev/shm/purge.sock" ]
      interval: 2s
      timeout: 2s
      retries: 5
      start_period: 3s
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: 100M

volumes:
  shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  backend:
  payment-processor:
    external: true

