x-service-templates:
  base: &base
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    volumes:
      - sockets:/sockets:rw

services:
  gateway:
    image: haproxy:alpine
    container_name: rinha-gateway
    hostname: rinha-gateway
    volumes:
      - sockets:/sockets:rw
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api01
      - api02
    networks:
      - backend
    ports:
      - "8888:8888"
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '50MB'

  api01: &api
    <<: *base
    hostname: api01
    container_name: rinha-api01
    command: ./producer
    environment:
      - REDIS_ADDR=storage:6379
      - SERVICE_SOCKET=/sockets/go.sock.1
    networks:
      - backend
    ports:
      - "8081:8888"
    depends_on:
      storage:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 50M

  api02:
    <<: *api
    hostname: api02
    container_name: rinha-api02
    command: ./producer
    environment:
      - REDIS_ADDR=storage:6379
      - SERVICE_SOCKET=/sockets/go.sock.2
    ports:
      - "8082:8888"

  consumer:
    <<: *base
    hostname: consumer
    container_name: rinha-consumer
    command: ./consumer
    environment:
      - REDIS_ADDR=storage:6379
    networks:
      - backend
      - payment-processor
    ports:
      - "8089:8888"
    depends_on:
      storage:
        condition: service_healthy
    restart: on-failure
    deploy:
      resources:
        limits:
          cpus: '0.70'
          memory: 50M

  storage:
    image: redis:alpine
    hostname: storage
    container_name: rinha-storage
    ports:
      - "6379:6379"
    volumes:
      - storage:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 2s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 100M
    sysctls:
      - net.core.somaxconn=1024

volumes:
  sockets:
  storage:


networks:
  backend:
  payment-processor:
    external: true

