x-service-templates:
  api: &api
    build:
      context: ../
      dockerfile: ./build/Dockerfile
    #image: laurentinodeev/rinha-2025-go:v1
    depends_on:
      - storage
    networks:
      - rinha
      - payment-processor
    volumes:
      - shm:/dev/shm
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '50MB'

services:
  gateway:
    image: haproxy:alpine
    container_name: rinha-gateway
    volumes:
      - shm:/dev/shm
      - ../config/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - api01
      - api02
      - api03
    networks:
      - rinha
    ports:
      - "9999:9999"
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '50MB'

  api01: &api
    <<: *api
    container_name: rinha-api01
    environment:
      - SERVICE_SOCKET=/dev/shm/go.sock.1
  api02:
    <<: *api
    container_name: rinha-api02
    environment:
      - SERVICE_SOCKET=/dev/shm/go.sock.2
  api03:
    <<: *api
    container_name: rinha-api03
    environment:
      - SERVICE_SOCKET=/dev/shm/go.sock.3

  storage:
    image: postgres:17-alpine
    container_name: rinha-storage
    environment:
      POSTGRES_PASSWORD: rinha
      POSTGRES_USER: rinha
      POSTGRES_DB: rinha
    ports:
      - 1010:5432
    volumes:
      - ../config/postgresql.conf:/etc/postgresql.conf:ro
      - ../config/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: [ "postgres", "-c", "config_file=/etc/postgresql.conf" ]
    networks:
      - rinha
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rinha -d rinha" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 30s
    ulimits:
      nproc: 1000000
      nofile:
        soft: 1000000
        hard: 1000000
    deploy:
      restart_policy:
        condition: on-failure
        delay: 2s
        max_attempts: 10
        window: 5s
      resources:
        limits:
          cpus: "0.5"
          memory: "190MB"

volumes:
  postgres-data:
  shm:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs

networks:
  rinha:
  payment-processor:
    external: true

