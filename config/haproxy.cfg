# global
#   maxconn 20000
#   daemon

defaults
  mode http
  timeout client 5000s
  timeout connect 5000s
  timeout server 5000s
  option http-keep-alive

frontend frontend
  bind *:9999
  default_backend go-backend

backend go-backend
  balance roundrobin
  option http-keep-alive
  server api-1 unix@/dev/shm/go.1.sock check
  server api-2 unix@/dev/shm/go.2.sock check
  server api-3 unix@/dev/shm/go.3.sock check

frontend stats
    bind *:8888
    stats uri /stats
    stats enable
